<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IITM Feedback Form</title>

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f4f4f4;
}

/* HEADER */
header {
    background: #800020;
    color: #f5f5dc;
    text-align: center;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* FORM BOX */
.container {
    max-width: 700px;
    margin: 40px auto;
    background: #7b001c;
    padding: 35px;
    border-radius: 15px;
    color: #f5f5dc;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* LOGO */
.logo {
    display: block;
    margin: auto;
    width: 180px;
    margin-bottom: 20px;
}

/* LABEL */
.form-label {
    display: block;
    margin-top: 18px;
    font-weight: bold;
    text-decoration: underline;
}

/* INPUT */
input, select, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 6px;
    border: none;
    outline: none;
    font-size: 14px;
}

/* DOB */
.dob {
    display: flex;
    gap: 10px;
}

.dob select {
    flex: 1;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(to right, #e6c07b, #d4a44f);
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* SUCCESS */
.success {
    margin-top: 20px;
    background: #00a86b;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
}

.hidden {
    display: none;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
}

.footer a {
    color: #f5f5dc;
}

</style>
</head>

<body>

<header>
    Indian Institute Of Technology Madras
</header>

<div class="container">

    <img src="logo.png" class="logo">

    <form id="form">

        <label class="form-label">Name</label>
        <input type="text" id="name" required>

        <label class="form-label">Gender</label>
        <select id="gender" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>

        <label class="form-label">Date of Birth</label>
        <div class="dob">
            <select id="day"></select>
            <select id="month"></select>
            <select id="year"></select>
        </div>

        <label class="form-label">Guardian's Name</label>
        <input type="text" id="guardian">

        <label class="form-label">Phone Number</label>
        <input type="tel" id="phone">

        <label class="form-label">Email Address</label>
        <input type="email" id="email">

        <label class="form-label">Course Name</label>
        <select id="course">
            <option value="">Select Course</option>
            <option>BS in Data Science</option>
            <option>BS in Electronic System</option>
            <option>BS in Management</option>
            <option>BS in Aeronautics</option>
        </select>

        <label class="form-label">Course Level</label>
        <select id="level">
            <option value="">Select Level</option>
            <option>Foundation</option>
            <option>Degree</option>
            <option>BSc</option>
            <option>BS</option>
            <option>MS</option>
        </select>

        <label class="form-label">Difficulty Level</label>
        <select id="difficulty">
            <option value="">Select Difficulty</option>
            <option>High</option>
            <option>Moderate</option>
            <option>Low</option>
        </select>

        <label class="form-label">Feedback Note</label>
        <textarea id="feedback" rows="3"></textarea>

        <label class="form-label">Password (6 digit)</label>
        <input type="password" id="password" maxlength="6" required>

        <button type="submit" class="btn">Submit Feedback</button>

    </form>

    <div id="successBox" class="success hidden">
        ✅ Feedback submitted successfully!
    </div>

    <div class="footer">
        <p>We respect your Feedback. Thank you for visiting this page.</p>
        <p>Email: theonexzero01@gmail.com |</p> 
    </div>

</div>

<script>

/* DOB AUTO */
for(let i=1;i<=31;i++){ day.innerHTML += `<option>${i}</option>`; }
for(let i=1;i<=12;i++){ month.innerHTML += `<option>${i}</option>`; }
for(let i=1980;i<=2025;i++){ year.innerHTML += `<option>${i}</option>`; }

/* SUBMIT */
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    if(!/^[0-9]{6}$/.test(password.value)){
        alert("Password must be 6 digits!");
        return;
    }

    let data = {
        name: name.value,
        gender: gender.value,
        email: email.value,
        feedback: feedback.value
    };

    let allData = JSON.parse(localStorage.getItem("feedback")) || [];
    allData.push(data);
    localStorage.setItem("feedback", JSON.stringify(allData));

    document.getElementById("successBox").classList.remove("hidden");
    this.reset();
});

</script>

</body>
</html>
